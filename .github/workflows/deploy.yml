name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions requises par le déploiement Pages via Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/configure-pages@v5

      - run: npm ci

      # Site de PROJET (florianbouchart.github.io/portfolio/) : le base doit
      # être /portfolio/. vite.config.ts lit process.env.VITE_BASE.
      - run: npm run build
        env:
          VITE_BASE: /portfolio/

      # SPA + GitHub Pages : servir index.html sur les 404 pour que /formation,
      # /realisations, etc. fonctionnent en accès direct et au rafraîchissement.
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
